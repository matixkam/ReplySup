<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplySup – Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0d0d0d;
    --white: #f7f6f2;
    --accent: #c8f135;
    --mid: #1a1a1a;
    --border: #2a2a2a;
    --muted: #666;
    --red: #ff5555;
  }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .logo span { color: var(--accent); }
  .robot {
    display: block;
    margin: 0 auto 1rem;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 2rem;
  }
  .tabs {
    display: flex;
    background: #111;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.5rem;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 0.5rem;
    border-radius: 7px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--mid);
    color: var(--white);
    border: 1px solid var(--border);
  }
  .form-group { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: #aaa;
    margin-bottom: 0.4rem;
  }
  input {
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    color: var(--white);
    padding: 0.75rem 1rem;
    border-radius: 10px;
    font-size: 0.9rem;
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    background: var(--accent);
    color: var(--black);
    border: none;
    padding: 0.85rem;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg {
    text-align: center;
    font-size: 0.8rem;
    margin-top: 1rem;
    padding: 0.75rem;
    border-radius: 8px;
    display: none;
  }
  .msg.success { background: #1a2e1a; color: var(--accent); display: block; }
  .msg.error { background: #2e1a1a; color: var(--red); display: block; }
  .divider {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin: 1.25rem 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .google-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--white);
    padding: 0.75rem;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .google-btn:hover { background: #222; }
  .fine-print {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 1.25rem;
  }
  .fine-print a { color: #888; }
</style>
</head>
<body>

<div class="card">
  <svg class="robot" width="52" height="52" viewBox="0 0 84 84">
    <rect x="14" y="22" width="56" height="46" rx="14" fill="#111" stroke="#c8f135" stroke-width="2.5"/>
    <rect x="36" y="8" width="12" height="16" rx="5" fill="#111" stroke="#c8f135" stroke-width="2.5"/>
    <circle cx="42" cy="10" r="4" fill="#c8f135"/>
    <circle cx="29" cy="42" r="6" fill="#c8f135"/>
    <circle cx="55" cy="42" r="6" fill="#c8f135"/>
    <path d="M30 56 Q42 64 54 56" stroke="#c8f135" stroke-width="3" stroke-linecap="round" fill="none"/>
    <rect x="2" y="38" width="8" height="14" rx="4" fill="#111" stroke="#c8f135" stroke-width="2.5"/>
    <rect x="74" y="38" width="8" height="14" rx="4" fill="#111" stroke="#c8f135" stroke-width="2.5"/>
  </svg>

  <div class="logo">Reply<span>Sup</span></div>
  <p class="subtitle" id="subtitle">Sup is ready when you are</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign in</div>
    <div class="tab" onclick="switchTab('signup')">Create account</div>
  </div>

  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@yourbusiness.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="handleLogin()">Sign in</button>
    <div class="divider">or</div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div id="form-signup" style="display:none;">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@yourbusiness.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="at least 8 characters">
    </div>
    <button class="btn" onclick="handleSignup()">Start 14-day free trial</button>
    <div class="divider">or</div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <p class="fine-print">No credit card needed. Cancel anytime.</p>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const SUPABASE_URL = 'https://pvupxjtnexpxgrdsvubv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_SRqy9zb-Yd-uVG2D7qz-Ew_awQra4DJ';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('subtitle').textContent = tab === 'login' ? 'Sup is ready when you are' : 'Join thousands of businesses letting Sup handle it';
    hideMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showMsg('Please fill in all fields.', 'error');
    const btn = document.querySelector('#form-login .btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    btn.disabled = false; btn.textContent = 'Sign in';
    if (error) return showMsg(error.message, 'error');
    showMsg('Signed in! Redirecting to dashboard...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  }

  async function handleSignup() {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    if (!email || !password) return showMsg('Please fill in all fields.', 'error');
    if (password.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
    const btn = document.querySelector('#form-signup .btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    const { error } = await sb.auth.signUp({ email, password });
    btn.disabled = false; btn.textContent = 'Start 14-day free trial';
    if (error) return showMsg(error.message, 'error');
    showMsg('Almost there! Check your email to confirm your account.', 'success');
  }

  async function handleGoogleLogin() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    });
    if (error) showMsg(error.message, 'error');
  }

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = 'dashboard.html';
    }
  });
</script>

</body>
</html>
